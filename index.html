<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中午吃什麼</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            background: #fafafa;
        }

        h1 {
            margin-bottom: 20px;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            /* 移到輪盤最上方 */
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            z-index: 10;
        }

        .pointer::before {
            content: "";
            position: absolute;
            inset: 0;
            background: red;
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            /* 尖端朝下 */
            border-radius: 0 0 40px 40px;
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="text"] {
            margin-top: 20px;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            height: 25px;
        }
    </style>
</head>

<body>

    <h1>🍱 中午吃什麼？</h1>

    <div class="wheel-container">
        <div class="pointer"></div>

        <svg viewBox="0 0 100 100" id="wheelSvg"></svg>
    </div>

    <button onclick="spin()">開始轉！</button>

    <!-- 餐點新增-->
    <div>
        <input type="text" id="newOption" placeholder="新增餐點" />
        <button onclick="addOption()">新增</button><br />
        <button onclick="resetOptions()">預設</button>
        <button onclick="showCustomDialog()">自訂</button>
    </div>

    <!-- 自訂餐點對話框 -->
    <dialog id="customDialog">
        <form method="dialog">
            <!-- 輸入框 -->
            <input type="text" id="customOption" placeholder="輸入餐點名稱" />
            <button type="button" onclick="addCustomOption()">新增</button>
            <br><br>
            目前餐點：
            <ul id="currentOptionsList">
                <!-- 這裡會動態生成餐點列表 -->
            </ul>
            <button type="submit">確定</button>
            <button type="button" onclick="document.getElementById('customDialog').close()">取消</button>
        </form>
    </dialog>


    <script>
        const options = [
            "八方雲集",
            "梁社漢",
            "一品鴨莊",
            "悟饕便當",
            "喜洋洋",
            "七福"
        ];

        const svg = document.getElementById("wheelSvg");
        const angleStep = 360 / options.length;

        /* 🎨 畫扇形 + 文字（SVG） */
        function polarToCartesian(cx, cy, r, angle) {
            const rad = (angle - 90) * Math.PI / 180;
            return {
                x: cx + r * Math.cos(rad),
                y: cy + r * Math.sin(rad)
            };
        }

        function describeArc(cx, cy, r, startAngle, endAngle) {
            const start = polarToCartesian(cx, cy, r, endAngle);
            const end = polarToCartesian(cx, cy, r, startAngle);
            const largeArc = endAngle - startAngle <= 180 ? "0" : "1";

            return `M ${cx} ${cy}
          L ${start.x} ${start.y}
          A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}
          Z`;
        }

        /* 建立轉盤 */
        const cx = 50;
        const cy = 50;
        const r = 50;

        options.forEach((text, i) => {
            const start = i * angleStep;
            const end = (i + 1) * angleStep;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", describeArc(cx, cy, r, start, end));
            path.setAttribute("fill", `hsl(${i * angleStep},70%,60%)`);

            svg.appendChild(path);

            /* 文字 */
            const mid = start + angleStep / 2;
            const pos = polarToCartesian(cx, cy, 30, mid);

            const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textEl.setAttribute("x", pos.x);
            textEl.setAttribute("y", pos.y);
            textEl.setAttribute("text-anchor", "middle");
            textEl.setAttribute("dominant-baseline", "middle");
            textEl.setAttribute("font-size", "4");
            textEl.textContent = text;

            svg.appendChild(textEl);
        });

        /* 🎡 旋轉 */
       let currentRotation = 0;

function spin() {
    const button = document.querySelector("button");
    if (button.disabled) return;
    button.disabled = true;

    const extraSpins = 1080;
    const angleStep = 360 / options.length;

    const randomExtra = Math.floor(Math.random() * 360);
    // 如果指針落在分界線上，randomExtra 可能會導致選擇不明確，因此我們可以稍微調整 randomExtra 的範圍，避免落在分界線上。
    const adjustedRandomExtra = randomExtra + (angleStep / 2);
    currentRotation += extraSpins + adjustedRandomExtra;

    svg.style.transition = 'transform 3.5s cubic-bezier(0.25, 0.1, 0.25, 1)';
    svg.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
        const finalAngle = currentRotation % 360;
        const selectedIndex = Math.floor((360 - finalAngle) / angleStep) % options.length;
        const selectedOption = options[selectedIndex];
        alert(`今天吃：${selectedOption}`);
        button.disabled = false;
    }, 3600);
}

        function addOption() {
            const newOptionInput = document.getElementById("newOption");
            const newOption = newOptionInput.value.trim();

            if (newOption) {
                options.push(newOption);
                newOptionInput.value = "";
                updateWheel();
            }
        }

        function updateWheel() {
            // 清空現有的SVG內容
            while (svg.firstChild) {
                svg.removeChild(svg.firstChild);
            }

            const newAngleStep = 360 / options.length;

            options.forEach((text, i) => {
                const start = i * newAngleStep;
                const end = (i + 1) * newAngleStep;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", describeArc(cx, cy, r, start, end));
                path.setAttribute("fill", `hsl(${i * newAngleStep},70%,60%)`);

                svg.appendChild(path);

                const mid = start + newAngleStep / 2;
                const pos = polarToCartesian(cx, cy, 30, mid);

                const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textEl.setAttribute("x", pos.x);
                textEl.setAttribute("y", pos.y);
                textEl.setAttribute("text-anchor", "middle");
                textEl.setAttribute("dominant-baseline", "middle");
                textEl.setAttribute("font-size", "4");
                textEl.textContent = text;

                svg.appendChild(textEl);
            });
        }

        function resetOptions() {
            // 預設餐點
            options.length = 0;
            options.push(
                "八方雲集",
                "梁社漢",
                "一品鴨莊",
                "悟饕便當",
                "喜洋洋",
                "七福"
            );
            updateWheel(); // 更新轉盤
        }

        // 叫出自訂對話框
        function showCustomDialog() {
            const dialog = document.getElementById("customDialog");
            const currentOptionsList = document.getElementById("currentOptionsList");

            // 清空現有的列表
            currentOptionsList.innerHTML = "";

            // 生成目前餐點列表
            options.forEach((option, index) => {
                const li = document.createElement("li");
                li.textContent = option;

                // 刪除按鈕
                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "刪除";
                deleteBtn.style.marginLeft = "10px";
                deleteBtn.onclick = () => {
                    options.splice(index, 1);
                    updateWheel();
                    showCustomDialog(); // 重新顯示對話框以更新列表
                };

                li.appendChild(deleteBtn);
                currentOptionsList.appendChild(li);
            });
            dialog.showModal();
        }

        function addCustomOption() {
            const customOptionInput = document.getElementById("customOption");
            const customOption = customOptionInput.value.trim();

            if (customOption) {
                options.push(customOption);
                customOptionInput.value = "";
                updateWheel();
                showCustomDialog(); // 重新顯示對話框以更新列表
            }
        }
    </script>
</body>

</html>
